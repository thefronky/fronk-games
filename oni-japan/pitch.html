<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONI — Japan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Shippori+Mincho+B1:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#040605;
    --ink:#eaf3ed;
    --green:#2be07f;
    --disp:'Chakra Petch',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:#040605;color:var(--ink);font-family:var(--disp);overflow-x:hidden;-webkit-font-smoothing:antialiased}
  img{display:block;width:100%;height:100%;object-fit:cover}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:60;background:radial-gradient(125% 95% at 50% 50%,transparent 52%,rgba(0,0,0,.6) 100%);mix-blend-mode:multiply}
  section{position:relative;width:100%}

  /* shared upper-left title block (hero + plate captions) */
  .titleblock{position:absolute;z-index:2;top:9vh;left:6vw;text-align:left;max-width:62vw}
  .wordmark{font-family:var(--disp);font-weight:700;font-size:clamp(44px,10.5vw,150px);line-height:.9;letter-spacing:.02em;text-transform:uppercase;color:var(--ink)}
  .wordmark .g{color:var(--green);text-shadow:0 0 38px rgba(43,224,127,.5)}
  .tagline{font-family:'Shippori Mincho B1',serif;margin-top:1.3rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;font-size:clamp(11px,1.45vw,18px);color:var(--ink);opacity:.85}
  .caption{font-family:var(--disp);font-weight:700;text-transform:uppercase;color:var(--ink);font-size:clamp(26px,5vw,68px);line-height:.94;letter-spacing:.01em}
  .caption .g{color:var(--green);text-shadow:0 0 38px rgba(43,224,127,.5)}
  /* ONI brand lockup — Japanese-feel mincho */
  .onibrand{font-family:'Shippori Mincho B1',serif;font-weight:800;letter-spacing:.06em;font-size:clamp(54px,12.5vw,190px);line-height:.92}
  .version{font-family:'Shippori Mincho B1',serif;margin-top:.05em;font-weight:700;text-transform:uppercase;font-size:clamp(22px,4.8vw,72px);letter-spacing:.3em;text-indent:.3em;color:var(--green);text-shadow:0 0 24px rgba(43,224,127,.45);line-height:1}
  .dare{position:absolute;z-index:2;left:8vw;bottom:8vh;font-family:'Shippori Mincho B1',serif;font-weight:600;font-size:clamp(26px,4.6vw,60px);color:var(--ink);opacity:.82;text-shadow:0 2px 26px rgba(0,0,0,.75)}

  .hero{height:100vh;min-height:640px;position:relative;overflow:hidden}
  .hero .bg{position:absolute;inset:0;z-index:0}
  .hero .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(4,6,5,.78) 0%,rgba(4,6,5,.35) 38%,transparent 60%)}
  .scrollcue{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:3;font-weight:500;letter-spacing:.4em;font-size:11px;text-transform:uppercase;color:rgba(234,243,237,.55);animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translate(-50%,0);opacity:.45}50%{transform:translate(-50%,8px);opacity:1}}

  /* IMAGE PLATES */
  .plate{height:100vh;min-height:600px;position:relative;overflow:hidden}
  .plate .frame{position:absolute;inset:0;z-index:0}
  .plate .frame::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(4,6,5,.7) 0%,rgba(4,6,5,.2) 40%,transparent 62%)}
  .frame img{transform:scale(1.07);transition:transform 7s ease-out}
  .plate.in .frame img,.hero .bg img,.closer.in .frame img{transform:scale(1)}

  /* CLOSER */
  .closer{height:100vh;min-height:640px;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}
  .closer .frame{position:absolute;inset:0;z-index:0}
  .closer .frame::after{content:"";position:absolute;inset:0;background:radial-gradient(72% 82% at 50% 46%,rgba(4,6,5,.32),#040605 92%)}
  .closer .inner{position:relative;z-index:2;padding:0 7vw}
  .closer .mark{font-family:'Shippori Mincho B1',serif;font-weight:800;text-transform:uppercase;font-size:clamp(38px,8vw,110px);line-height:.92;letter-spacing:.06em}
  .closer .mark .g{color:var(--green);text-shadow:0 0 38px rgba(43,224,127,.5)}
  .closer .tagline{margin-top:1.3rem;text-indent:.42em}

  /* THE GAME — spec */
  .spec{background:#040605;padding:13vh 7vw;border-top:1px solid rgba(43,224,127,.18)}
  .spec-inner{max-width:1040px;margin:0 auto}
  .eyebrow{font-weight:600;letter-spacing:.5em;text-indent:.5em;text-transform:uppercase;font-size:clamp(11px,1.2vw,14px);color:var(--green)}
  .spec-title{font-weight:600;font-size:clamp(28px,4vw,52px);line-height:1.1;margin:1.2rem 0 1.8rem;max-width:20ch;color:var(--ink)}
  .meta{display:flex;flex-wrap:wrap;gap:.6rem 1.4rem;margin-bottom:4rem}
  .meta span{font-weight:500;letter-spacing:.16em;text-transform:uppercase;font-size:clamp(10px,1.1vw,12px);color:#9fb3a8;border:1px solid rgba(159,179,168,.25);padding:.45em .9em;border-radius:2px}
  .insp{margin-bottom:1.5rem}
  .pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:1.6rem}
  .pillar h3{font-weight:600;text-transform:uppercase;letter-spacing:.18em;font-size:clamp(10px,1.15vw,13px);color:var(--green);margin-bottom:.4rem}
  .pillar p{font-size:clamp(14px,1.5vw,18px);line-height:1.35;color:var(--ink);font-weight:600}
  @media(max-width:860px){.pillars{grid-template-columns:repeat(2,1fr)}}

  .rv{opacity:0;transform:translateY(26px);transition:opacity 1s ease,transform 1.1s cubic-bezier(.2,.7,.2,1)}
  .rv.in{opacity:1;transform:none}
  .rv.d1{transition-delay:.14s}.rv.d2{transition-delay:.28s}.rv.d3{transition-delay:.42s}

  /* PRINT — for the textable PDF: reveal everything, full-bleed pages */
  @media print{
    @page{size:1280px 720px;margin:0}
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
    html,body{background:#040605!important}
    body::after,.scrollcue{display:none!important}
    .rv{opacity:1!important;transform:none!important}
    .frame img,.hero .bg img{transform:none!important}
    .hero,.plate,.closer{height:720px!important;min-height:0!important;page-break-after:always;break-after:page}
    .spec{page-break-after:always;break-after:page;padding:70px 80px}
  }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="bg"><img src="assets/01_hero.png" alt=""></div>
  <div class="titleblock">
    <h1 class="wordmark onibrand rv">ONI</h1>
    <div class="version rv d1">Japan</div>
    <div class="tagline rv d2">Coming to VR 2027</div>
  </div>
  <div class="scrollcue">Scroll</div>
</section>

<!-- PAGE 2 — THE GAME (explainer) -->
<section class="spec">
  <div class="spec-inner">
    <div class="eyebrow rv">The Game</div>
    <h2 class="spec-title rv d1">A thrilling cinematic combat experience.</h2>
    <div class="meta rv d2"><span>Active</span><span>Room-scale</span><span>One hour</span><span>Replayable</span><span>Solo + Co-op</span></div>
    <div class="eyebrow insp rv">Inspirations</div>
    <div class="pillars">
      <div class="pillar rv"><h3>Sword</h3><p>Blade &amp; Sorcery</p></div>
      <div class="pillar rv d1"><h3>Gun</h3><p>Half-Life: Alyx</p></div>
      <div class="pillar rv d2"><h3>Hand-to-hand</h3><p>Thrill of the Fight</p></div>
      <div class="pillar rv d3"><h3>Mastery</h3><p>SUPERHOT</p></div>
    </div>
  </div>
</section>

<!-- the reel: drink -> gun -> sushi -> overlook -->
<section class="plate" data-p>
  <div class="frame"><img src="assets/03_drink.png" alt=""></div>
  <div class="dare rv">Do you dare?</div>
</section>
<section class="plate" data-p><div class="frame"><img src="assets/07_pistol.png" alt=""></div></section>
<section class="plate" data-p><div class="frame"><img src="assets/04_sushi.png" alt=""></div></section>

<!-- CLOSER — the overlook -->
<section class="closer" data-p>
  <div class="frame"><img src="assets/02_mountain.png" alt=""></div>
  <div class="inner">
    <div class="mark onibrand rv">ONI</div>
    <div class="version rv d1">Japan</div>
    <div class="tagline rv d2">Coming to VR 2027</div>
  </div>
</section>

<script>
  const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');e.target.querySelectorAll('.rv').forEach(el=>el.classList.add('in'));}});},{threshold:.2});
  document.querySelectorAll('section').forEach(s=>io.observe(s));
  document.querySelectorAll('.hero .rv').forEach(el=>el.classList.add('in'));
</script>
</body>
</html>
