<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONI — prototype</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#000;height:100%;width:100%;font-family:'Segoe UI',system-ui,sans-serif}
  canvas{display:block}
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10}
  #vignette{position:absolute;inset:0;background:radial-gradient(120% 100% at 50% 55%,transparent 55%,rgba(0,0,0,.62) 100%);transition:opacity .3s}
  #drinkTint{position:absolute;inset:0;opacity:0;background:radial-gradient(110% 95% at 50% 55%,rgba(255,170,60,.10) 0%,rgba(40,10,0,.42) 100%);mix-blend-mode:screen;transition:opacity .5s}
  #hitFlash{position:absolute;inset:0;background:rgba(191,47,29,.0);transition:background .12s}
  #crosshair{position:absolute;left:50%;top:50%;width:5px;height:5px;margin:-2.5px 0 0 -2.5px;border-radius:50%;background:rgba(234,243,237,.8);box-shadow:0 0 6px rgba(43,224,127,.6)}
  .pips{position:absolute;display:flex;gap:8px;font-size:19px;letter-spacing:2px;text-shadow:0 1px 6px rgba(0,0,0,.8)}
  #ammoPips{left:24px;bottom:22px;color:#e8b04b}
  #drinkPips{left:24px;bottom:52px;color:#2be07f}
  #wavePips{right:24px;top:22px;color:#eaf3ed}
  .pip.spent{opacity:.18;filter:grayscale(1)}
  #stateTag{position:absolute;left:24px;top:22px;font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:#9fb3a8;font-weight:600}
  #center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;color:#eaf3ed;pointer-events:auto}
  #center h1{font-family:'Segoe UI',system-ui;font-weight:800;font-size:56px;letter-spacing:.05em;margin:0 0 8px;color:#e8b04b;text-shadow:0 0 30px rgba(232,176,75,.4)}
  #center .sub{font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:#2be07f;margin-bottom:26px}
  #center .keys{font-size:14px;line-height:2.1;color:#c7d2cb;background:rgba(6,8,7,.55);border:1px solid rgba(43,224,127,.25);border-radius:10px;padding:20px 28px;display:inline-block;text-align:left}
  #center .keys b{color:#eaf3ed;display:inline-block;min-width:120px}
  #center button{margin-top:22px;background:#2be07f;color:#04140b;border:0;border-radius:6px;padding:14px 34px;font-size:15px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
  #endcard{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;color:#eaf3ed;opacity:0;transition:opacity 1.2s}
  #endcard h1{font-weight:800;font-size:44px;color:#2be07f;letter-spacing:.06em;text-shadow:0 0 30px rgba(43,224,127,.5)}
  #endcard .sub{font-size:13px;letter-spacing:.35em;text-transform:uppercase;color:#9fb3a8;margin-top:10px}
</style>
</head>
<body>
<div id="hud">
  <div id="vignette"></div>
  <div id="drinkTint"></div>
  <div id="hitFlash"></div>
  <div id="crosshair"></div>
  <div id="stateTag">sword</div>
  <div class="pips" id="ammoPips"></div>
  <div class="pips" id="drinkPips"></div>
  <div class="pips" id="wavePips"></div>
  <div id="endcard"><h1>ONI</h1><div class="sub">the night is yours</div></div>
</div>
<div id="center">
  <h1>鬼 <span style="color:#eaf3ed">ONI</span></h1>
  <div class="sub">first-person prototype</div>
  <div class="keys">
    <div><b>Mouse</b> look + swing the sword</div>
    <div><b>WASD</b> move</div>
    <div><b>Q</b> draw / holster pistol</div>
    <div><b>Left Click</b> fire (when drawn)</div>
    <div><b>R</b> reload</div>
    <div><b>E</b> drink</div>
  </div>
  <div><button id="startBtn">enter the night</button></div>
</div>
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
