<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#150a17"/>
      <stop offset="38%" stop-color="#3f141d"/>
      <stop offset="68%" stop-color="#a83a22"/>
      <stop offset="100%" stop-color="#f4a23c"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff1c4"/>
      <stop offset="48%" stop-color="#ffb454"/>
      <stop offset="100%" stop-color="#e76a23" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eafff7"/>
      <stop offset="60%" stop-color="#7fe6d2"/>
      <stop offset="100%" stop-color="#2aa890" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#sky)"/>
  <clipPath id="r"><rect width="512" height="512" rx="115"/></clipPath>
  <g clip-path="url(#r)">
    <!-- the low sun, a soft glow disc -->
    <circle cx="256" cy="300" r="190" fill="url(#sun)"/>
    <circle cx="256" cy="300" r="96" fill="#ffd07a" opacity="0.9"/>

    <!-- the stag — bold, symmetric, graphic. one clean silhouette. -->
    <g fill="#0c0608">
      <!-- big branching antlers, drawn as a filled crown -->
      <path d="M232 196
               C228 168 222 150 214 134
               C209 122 213 116 222 122
               C229 127 234 138 239 150
               C236 132 232 112 232 96
               C232 86 240 84 244 94
               C248 104 250 124 252 142
               C255 120 258 104 264 92
               C269 82 277 85 275 98
               C273 116 270 134 270 152
               C276 138 283 126 291 120
               C300 114 304 120 298 130
               C289 146 282 166 278 196 Z"/>
      <!-- ears -->
      <path d="M232 206 q-30 -14 -42 -4 q10 18 38 22 z"/>
      <path d="M278 206 q30 -14 42 -4 q-10 18 -38 22 z"/>
      <!-- head + neck, a clean deer profile -->
      <path d="M255 198
               q-30 4 -36 44
               q-4 34 8 70
               q9 30 28 40
               q19 -10 28 -40
               q12 -36 8 -70
               q-6 -40 -36 -44 Z"/>
      <!-- muzzle -->
      <ellipse cx="255" cy="346" rx="15" ry="22"/>
    </g>
    <!-- glowing eyes — the only living light -->
    <circle cx="240" cy="260" r="14" fill="url(#eye)"/>
    <circle cx="271" cy="260" r="14" fill="url(#eye)"/>
    <circle cx="240" cy="260" r="5" fill="#eafff7"/>
    <circle cx="271" cy="260" r="5" fill="#eafff7"/>

    <!-- dark jagged treeline anchoring the base -->
    <path d="M0 426 L42 404 L74 420 L110 396 L150 418 L194 398 L238 420 L256 404
             L292 420 L334 398 L376 420 L414 400 L452 418 L484 404 L512 422
             L512 512 L0 512 Z" fill="#080406"/>
  </g>
</svg>
