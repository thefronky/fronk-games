<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="#5a160f"/>
      <stop offset="42%" stop-color="#2a0a0e"/>
      <stop offset="100%" stop-color="#0a0507"/>
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="48%" r="58%">
      <stop offset="0%" stop-color="#fff3c8"/>
      <stop offset="26%" stop-color="#ffd24e"/>
      <stop offset="58%" stop-color="#f07a17"/>
      <stop offset="100%" stop-color="#7c1d07"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb04a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffb04a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <clipPath id="r"><rect width="512" height="512" rx="115"/></clipPath>
  <g clip-path="url(#r)">
    <!-- ambient ember glow -->
    <circle cx="256" cy="256" r="230" fill="url(#glow)"/>

    <!-- the eye: an almond aperture. dark lids above and below. -->
    <!-- lid shadow (the socket) -->
    <path d="M40 256 C150 150, 362 150, 472 256 C362 362, 150 362, 40 256 Z"
          fill="#000" opacity="0.55"/>

    <!-- the glowing iris, clipped to the eye almond -->
    <clipPath id="eye">
      <path d="M64 256 C160 176, 352 176, 448 256 C352 336, 160 336, 64 256 Z"/>
    </clipPath>
    <g clip-path="url(#eye)">
      <rect x="64" y="150" width="384" height="212" fill="#1a0c06"/>
      <circle cx="256" cy="256" r="118" fill="url(#iris)"/>
      <!-- vertical slit pupil — the predator -->
      <ellipse cx="256" cy="256" rx="26" ry="112" fill="#080304"/>
      <!-- iris fibres: faint radial ticks -->
      <g stroke="#ffcf6e" stroke-width="2" opacity="0.35">
        <line x1="256" y1="256" x2="256" y2="150"/>
        <line x1="256" y1="256" x2="350" y2="200"/>
        <line x1="256" y1="256" x2="362" y2="256"/>
        <line x1="256" y1="256" x2="350" y2="312"/>
        <line x1="256" y1="256" x2="162" y2="312"/>
        <line x1="256" y1="256" x2="150" y2="256"/>
        <line x1="256" y1="256" x2="162" y2="200"/>
      </g>
      <!-- wet specular glint -->
      <circle cx="212" cy="212" r="22" fill="#fff" opacity="0.92"/>
      <circle cx="300" cy="290" r="9" fill="#fff" opacity="0.5"/>
    </g>

    <!-- crisp lid lines framing the almond -->
    <path d="M64 256 C160 176, 352 176, 448 256" fill="none" stroke="#1c0d08" stroke-width="14" stroke-linecap="round"/>
    <path d="M64 256 C160 336, 352 336, 448 256" fill="none" stroke="#0c0507" stroke-width="14" stroke-linecap="round"/>
    <!-- a single lash flick at each corner for menace -->
    <path d="M64 256 l-22 -10 M448 256 l22 -10" stroke="#1c0d08" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
