<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>FRONK WILDS</title>
<meta name="theme-color" content="#1a0f08">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#1a0f08;font-family:-apple-system,system-ui,sans-serif;
    user-select:none;-webkit-user-select:none;touch-action:none}
  #c{position:fixed;inset:0;width:100%;height:100%}

  /* ── HUD ── */
  #hud{position:fixed;inset:0;pointer-events:none;color:#f5ead8;opacity:0;transition:opacity .8s}
  #crosshair{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:6px;height:6px;border-radius:50%;background:rgba(245,234,216,.9);
    box-shadow:0 0 8px rgba(0,0,0,.6);transition:transform .15s}
  #crosshair.drawn{transform:translate(-50%,-50%) scale(2.2);background:#ffd27d}
  #notes{position:absolute;top:max(14px,env(safe-area-inset-top));left:16px;
    font-size:13px;line-height:1.7;text-shadow:0 1px 4px rgba(0,0,0,.8);opacity:.95}
  #notes b{color:#ffd27d;font-weight:600}
  #toast{position:absolute;top:22%;left:50%;transform:translateX(-50%);
    font-size:17px;font-weight:600;letter-spacing:.04em;text-align:center;
    text-shadow:0 2px 10px rgba(0,0,0,.9);opacity:0;transition:opacity .4s;max-width:88%}
  #hp{position:absolute;top:max(14px,env(safe-area-inset-top));right:16px;width:120px;height:10px;
    border:1px solid rgba(245,234,216,.5);border-radius:6px;overflow:hidden}
  #hpfill{height:100%;width:100%;background:#c9543a;transition:width .3s}
  #hurt{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(160,20,10,.55));
    opacity:0;transition:opacity .25s;pointer-events:none}

  /* ── title screen — the world itself is the backdrop ── */
  #title{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
    align-items:center;justify-content:center;color:#f5ead8;text-align:center;
    padding:24px;transition:opacity 1.2s;
    background:radial-gradient(ellipse at center,transparent 30%,rgba(8,5,3,.62) 100%)}
  #title h1{font-family:Georgia,'Times New Roman',serif;font-weight:400;
    font-size:clamp(34px,8vw,64px);letter-spacing:.34em;text-indent:.34em;
    text-shadow:0 2px 24px rgba(0,0,0,.85),0 0 60px rgba(255,210,125,.25)}
  #title .sub{margin-top:10px;font-size:12px;letter-spacing:.42em;text-indent:.42em;
    text-transform:uppercase;opacity:.66;text-shadow:0 1px 8px rgba(0,0,0,.9)}
  #play{pointer-events:auto;margin-top:56px;background:none;border:none;cursor:pointer;
    color:#f5ead8;font-family:Georgia,serif;font-size:17px;letter-spacing:.24em;
    text-indent:.24em;opacity:.9;text-shadow:0 1px 12px rgba(0,0,0,.9);
    animation:breathe 3.4s ease-in-out infinite;padding:14px 30px}
  @keyframes breathe{0%,100%{opacity:.35}50%{opacity:.95}}
  #loadmsg{position:absolute;bottom:max(26px,env(safe-area-inset-bottom));
    font-size:11px;letter-spacing:.18em;opacity:.45}
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:5;
    background:radial-gradient(ellipse at center,transparent 62%,rgba(10,6,4,.38) 100%)}

  /* ── touch controls ── */
  .stick{position:fixed;bottom:max(26px,env(safe-area-inset-bottom));width:118px;height:118px;
    border-radius:50%;border:2px solid rgba(245,234,216,.35);background:rgba(0,0,0,.18);
    display:none;pointer-events:none}
  #stickL{left:22px}
  .knob{position:absolute;left:50%;top:50%;width:48px;height:48px;border-radius:50%;
    background:rgba(245,234,216,.55);transform:translate(-50%,-50%)}
  #shootBtn{position:fixed;right:26px;bottom:max(40px,calc(env(safe-area-inset-bottom) + 14px));
    width:84px;height:84px;border-radius:50%;display:none;align-items:center;justify-content:center;
    background:rgba(201,84,58,.85);border:3px solid rgba(245,234,216,.5);color:#fff;
    font-size:13px;font-weight:800;letter-spacing:.04em;pointer-events:auto}
  .touch #stickL,.touch #shootBtn{display:flex}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="crosshair"></div>
  <div id="notes"></div>
  <div id="toast"></div>
  <div id="journal" style="position:absolute;left:50%;bottom:18%;transform:translateX(-50%) translateY(30px);
    max-width:min(480px,88%);background:rgba(26,19,10,.92);border:1px solid rgba(217,164,65,.5);
    border-radius:14px;padding:18px 22px;opacity:0;transition:opacity .5s,transform .5s;
    box-shadow:0 12px 40px rgba(0,0,0,.6)">
    <div id="jr-kicker" style="font-size:11px;letter-spacing:.18em;color:#d9a441;font-weight:700;margin-bottom:6px"></div>
    <div id="jr-name" style="font-family:Georgia,serif;font-size:20px;font-weight:700;margin-bottom:6px"></div>
    <div id="jr-body" style="font-size:14px;line-height:1.55;opacity:.9"></div>
  </div>
  <div id="hp"><div id="hpfill"></div></div>
  <div id="mute" style="position:absolute;top:max(34px,calc(env(safe-area-inset-top) + 20px));right:16px;
    font-size:20px;pointer-events:auto;cursor:pointer;opacity:.8">🔊</div>
</div>
<div id="hurt"></div>

<div id="stickL" class="stick"><div class="knob" id="knobL"></div></div>
<div id="shootBtn">HOLD<br>→ LOOSE</div>

<div id="vignette"></div>
<div id="title">
  <h1>FRONK&nbsp;WILDS</h1>
  <div class="sub">a field survey</div>
  <button id="play">— begin —</button>
  <div id="loadmsg">the wilderness is loading</div>
</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module" src="game.js?v=12"></script>
</body>
</html>
