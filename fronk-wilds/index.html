<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>CONSUME</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#070403">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#070403;font-family:-apple-system,system-ui,sans-serif;
    user-select:none;-webkit-user-select:none;touch-action:none}
  #c{position:fixed;inset:0;width:100%;height:100%}

  /* ── HUD ── */
  #hud{position:fixed;inset:0;pointer-events:none;color:#f5ead8;opacity:0;transition:opacity .8s}
  #crosshair{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:6px;height:6px;border-radius:50%;background:rgba(245,234,216,.9);
    box-shadow:0 0 8px rgba(0,0,0,.6);transition:transform .15s}
  #crosshair.drawn{transform:translate(-50%,-50%) scale(2.2);background:#ffd27d}
  #notes{position:absolute;top:max(14px,env(safe-area-inset-top));left:16px;
    font-size:13px;line-height:1.7;text-shadow:0 1px 4px rgba(0,0,0,.8);opacity:.95}
  #notes b{color:#ffd27d;font-weight:600}
  #notes .kept{color:#9a8f7e;opacity:.85}
  #notes .ammo{color:#e8d6b0;font-weight:600}
  #notes .ammo.low{color:#e0683a}
  #toast{position:absolute;top:22%;left:50%;transform:translateX(-50%);
    font-size:17px;font-weight:600;letter-spacing:.04em;text-align:center;
    text-shadow:0 2px 10px rgba(0,0,0,.9);opacity:0;transition:opacity .4s;max-width:88%}
  /* cinematic line — big, centered, no box; feels like he says it */
  /* cinematic line = a movie SUBTITLE: one line, lower third, never over the
     reticle, never wrapping/splitting */
  #cinematic{position:absolute;left:50%;bottom:14%;top:auto;transform:translateX(-50%);
    font-family:'Cinzel',Georgia,serif;font-size:clamp(18px,3.4vw,28px);font-weight:600;letter-spacing:.1em;
    white-space:nowrap;text-align:center;color:#f5ead8;text-shadow:0 2px 14px rgba(0,0,0,.98);
    opacity:0;transition:opacity 1.4s ease;max-width:94vw;pointer-events:none}
  #hp{position:absolute;top:max(14px,env(safe-area-inset-top));right:16px;width:120px;height:10px;
    border:1px solid rgba(245,234,216,.5);border-radius:6px;overflow:hidden;
    opacity:0;transition:opacity .6s}
  #notes{color:#e8b07a;font-size:15px;letter-spacing:.3em}
  #hpfill{height:100%;width:100%;background:#c9543a;transition:width .3s}
  #hurt{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(160,20,10,.55));
    opacity:0;transition:opacity .25s;pointer-events:none}
  /* bear maul — a deeper red vignette + blood running down the lens */
  #maul{position:fixed;inset:0;z-index:8;opacity:0;pointer-events:none;transition:opacity .12s ease-out;
    background:radial-gradient(ellipse 70% 70% at center,transparent 22%,rgba(120,6,4,.62) 78%,rgba(70,2,2,.9) 100%)}
  #blood{position:fixed;inset:0;z-index:9;pointer-events:none;overflow:hidden}
  #blood .drip{position:absolute;top:-16vh;width:var(--w,10px);height:var(--h,22vh);border-radius:0 0 50% 50%/0 0 14px 14px;
    background:linear-gradient(180deg,rgba(120,6,4,0),rgba(140,8,6,.78) 30%,rgba(95,3,3,.9));
    filter:blur(.5px);opacity:0;transform:translateY(0)}
  #blood .drip.run{animation:bdrip var(--t,2.6s) ease-in forwards}
  @keyframes bdrip{0%{opacity:0;transform:translateY(0)}8%{opacity:1}
    100%{opacity:0;transform:translateY(135vh)}}

  /* ── title screen — the world itself is the backdrop, gone wrong ── */
  #title{position:fixed;inset:0;z-index:10;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;justify-content:center;color:#d9cfc0;text-align:center;
    padding:24px;transition:opacity 1.2s, background 1.8s ease-out;
    /* dark to start — the map is hidden behind cloud. just CONSUME. */
    background:radial-gradient(ellipse at center,rgba(8,5,5,.95) 0%,rgba(2,1,1,.99) 100%)}
  /* first tap: the cloud parts, the valley appears beneath */
  #title.revealed{background:radial-gradient(ellipse at center,transparent 28%,rgba(4,2,2,.5) 100%)}
  #title h1{font-family:'Cinzel','Times New Roman',serif;font-weight:700;
    white-space:nowrap;margin:0;
    font-size:clamp(46px,12.5vw,128px);letter-spacing:.1em;text-indent:.1em;
    background:linear-gradient(180deg,#fbf1de 0%,#e7cda0 48%,#caa06a 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 3px 18px rgba(0,0,0,.9)) drop-shadow(0 0 60px rgba(150,30,12,.35));
    animation:emberglow 6s ease-in-out infinite}
  @keyframes emberglow{0%,100%{filter:drop-shadow(0 3px 18px rgba(0,0,0,.9)) drop-shadow(0 0 50px rgba(150,30,12,.28))}
    50%{filter:drop-shadow(0 3px 18px rgba(0,0,0,.9)) drop-shadow(0 0 78px rgba(200,60,20,.5))}}
  #title .rule{display:flex;align-items:center;gap:16px;margin-top:20px;width:min(360px,70vw);opacity:.9}
  #title .rule i{flex:1;height:1px;background:linear-gradient(90deg,transparent,#caa06a)}
  #title .rule i:last-child{background:linear-gradient(90deg,#caa06a,transparent)}
  #title .rule svg{width:30px;height:12px;flex:none}
  #title .sub{margin-top:16px;font-family:'Cinzel','Times New Roman',serif;font-weight:500;
    font-size:clamp(11px,3vw,15px);letter-spacing:.42em;text-indent:.42em;text-transform:lowercase;
    color:#bfa48a;opacity:.85;text-shadow:0 1px 8px rgba(0,0,0,.95)}
  #play{pointer-events:auto;margin-top:60px;background:none;border:none;cursor:pointer;
    color:#d9cfc0;font-family:'Times New Roman',Georgia,serif;font-size:16px;
    letter-spacing:.3em;text-indent:.3em;text-transform:lowercase;
    text-shadow:0 1px 12px rgba(0,0,0,.95);
    animation:breathe 4.6s ease-in-out infinite;padding:14px 30px}
  @keyframes breathe{0%,100%{opacity:.22}50%{opacity:.82}}
  #loadmsg{position:absolute;bottom:max(26px,env(safe-area-inset-bottom));
    font-size:11px;letter-spacing:.18em;opacity:.45}
  #veil{position:fixed;inset:0;z-index:18;background:#050302;opacity:0;pointer-events:none;transition:opacity .25s linear}
  /* arrival flash — the white blast of impact when you strike the earth */
  #flash{position:fixed;inset:0;z-index:19;background:#fff6e6;opacity:0;pointer-events:none !important}
  /* heavenly wash — climbing the clouds/kitchen overexposes the world to white */
  #heaven{position:fixed;inset:0;z-index:7;opacity:0;pointer-events:none;
    background:radial-gradient(ellipse at center,#ffffff 0%,#eef4ff 70%,#dfe9ff 100%);
    transition:opacity .4s linear}
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:5;
    background:radial-gradient(ellipse at center,transparent 52%,rgba(5,3,2,.52) 100%)}
  /* exhaustion — hunger closes in at the edges. soft, feathered, breathing.
     opacity driven from game.js by how long since you last ate. */
  #exhaust{position:fixed;inset:0;pointer-events:none;z-index:6;opacity:0;
    background:radial-gradient(ellipse 78% 78% at center,transparent 30%,
      rgba(8,5,3,.6) 72%,rgba(4,2,1,.92) 100%)}
  /* CONSUME — appears when you stand by a glowing mushroom. tap to eat. */
  #consume{position:fixed;left:50%;bottom:30%;transform:translate(-50%,0) scale(.9);
    z-index:16;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;
    font-family:'Cinzel','Times New Roman',serif;font-weight:600;font-size:17px;
    letter-spacing:.34em;text-indent:.34em;text-transform:uppercase;color:#f6e6c2;
    background:rgba(28,12,30,.34);border:1.5px solid rgba(180,120,255,.55);
    border-radius:40px;padding:15px 34px;cursor:pointer;-webkit-tap-highlight-color:transparent;
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    box-shadow:0 0 26px rgba(150,80,255,.4),inset 0 0 18px rgba(150,80,255,.18);
    text-shadow:0 0 14px rgba(190,130,255,.7)}
  #consume.show{opacity:1;pointer-events:auto;transform:translate(-50%,0) scale(1);
    animation:consumePulse 1.8s ease-in-out infinite}
  #consume:active{transform:translate(-50%,0) scale(.95)}
  @keyframes consumePulse{0%,100%{box-shadow:0 0 22px rgba(150,80,255,.34),inset 0 0 16px rgba(150,80,255,.16)}
    50%{box-shadow:0 0 38px rgba(170,100,255,.6),inset 0 0 22px rgba(150,80,255,.26)}}

  /* ── eyelids — the wake-up. two black bars that retract like opening eyes.
       transform driven by a CSS var set from game.js (intro owns timing). ── */
  /* default OPEN (lids off-screen) so the title screen is never covered;
     beginIntro() slams --lid to 0% to start the wake-up */
  #eyelids{position:fixed;inset:0;z-index:20;pointer-events:none;--lid:-100%;--lidGlow:0}
  #eyelids .lid{position:absolute;left:0;right:0;height:52%;background:#050302;
    transition:transform .18s ease-out}
  #lidTop{top:0;transform-origin:top;transform:translateY(var(--lid,0%))}
  #lidBot{bottom:0;transform-origin:bottom;transform:translateY(calc(-1 * var(--lid,0%)))}
  /* a slow, heavy waking blink (used the moment you land on the roses) */
  #eyelids.waking .lid{transition:transform .8s ease-in-out}
  #eyelids::after{content:"";position:absolute;inset:0;pointer-events:none;
    opacity:var(--lidGlow,0);background:radial-gradient(ellipse at center,
      transparent 30%,rgba(5,3,2,.6) 100%)}

  /* ── touch controls — quiet, carved, blended into the world ── */
  .stick{position:fixed;bottom:max(30px,calc(env(safe-area-inset-bottom) + 18px));
    width:124px;height:124px;border-radius:50%;
    border:1.5px solid rgba(236,224,200,.22);background:rgba(20,14,9,.12);
    backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
    display:none;pointer-events:none}
  #stickL{left:26px}
  .knob{position:absolute;left:50%;top:50%;width:52px;height:52px;border-radius:50%;
    background:rgba(236,224,200,.32);border:1px solid rgba(236,224,200,.4);
    transform:translate(-50%,-50%)}
  /* round, frosted action buttons — icon only, no words */
  .abtn{position:fixed;display:none;align-items:center;justify-content:center;
    border-radius:50%;pointer-events:auto;color:rgba(244,233,212,.82);
    background:rgba(20,14,9,.16);border:1.5px solid rgba(236,224,200,.28);
    backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
    transition:transform .08s,background .12s;-webkit-tap-highlight-color:transparent}
  .abtn:active{transform:scale(.93);background:rgba(60,30,18,.34)}
  .abtn svg{width:46%;height:46%;opacity:.9}
  /* draw/shoot: primary, lowest-right under the thumb */
  #shootBtn{right:28px;bottom:max(34px,calc(env(safe-area-inset-bottom) + 18px));
    width:92px;height:92px}
  #shootBtn.drawing{background:rgba(150,40,22,.4);border-color:rgba(255,180,120,.6)}
  /* jump: smaller, up-left of shoot — the classic reachable arc */
  #jumpBtn{right:128px;bottom:max(58px,calc(env(safe-area-inset-bottom) + 40px));
    width:66px;height:66px}
  /* controls reveal ONE at a time as you learn to leave the base */
  .touch.show-move #stickL{display:flex;animation:ctlIn .7s ease both}
  .touch.show-jump #jumpBtn{display:flex;animation:ctlIn .7s ease both}
  .touch.show-bow #shootBtn{display:flex;animation:ctlIn .7s ease both}
  @keyframes ctlIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:none}}
  /* canoe mode: two big oar buttons across the bottom, hard to miss */
  #oarL,#oarR{bottom:max(28px,calc(env(safe-area-inset-bottom) + 16px));
    width:120px;height:96px;border-radius:20px;font-family:'Cinzel',serif;
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;flex-direction:column;gap:6px}
  #oarL{left:26px}  #oarR{right:26px}
  #oarL svg,#oarR svg{width:34px;height:34px}
  /* in the canoe: the move stick steers the boat; oars + jump are gone */
  .touch.canoe #oarL,.touch.canoe #oarR{display:none}
  .touch.canoe #jumpBtn{display:none}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="crosshair"></div>
  <div id="notes"></div>
  <div id="toast"></div>
  <div id="cinematic"></div>
  <div id="journal" style="position:absolute;left:50%;bottom:18%;transform:translateX(-50%) translateY(30px);
    max-width:min(480px,88%);background:rgba(26,19,10,.92);border:1px solid rgba(217,164,65,.5);
    border-radius:14px;padding:18px 22px;opacity:0;transition:opacity .5s,transform .5s;
    box-shadow:0 12px 40px rgba(0,0,0,.6)">
    <div id="jr-kicker" style="font-size:11px;letter-spacing:.18em;color:#d9a441;font-weight:700;margin-bottom:6px"></div>
    <div id="jr-name" style="font-family:Georgia,serif;font-size:20px;font-weight:700;margin-bottom:6px"></div>
    <div id="jr-body" style="font-size:14px;line-height:1.55;opacity:.9"></div>
  </div>
  <div id="hp"><div id="hpfill"></div></div>
  <div id="mute" style="position:absolute;top:max(34px,calc(env(safe-area-inset-top) + 20px));right:16px;
    font-size:20px;pointer-events:auto;cursor:pointer;opacity:.8">🔊</div>
</div>
<div id="hurt"></div>
<div id="maul"></div>
<div id="blood"></div>
<div id="veil"></div>
<div id="flash"></div>
<div id="heaven"></div>
<!-- surreal liquid-warp filter for the deep trip (desktop) -->
<svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
  <filter id="warp" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.01 0.014" numOctaves="2" seed="5" result="n">
      <animate attributeName="baseFrequency" dur="22s"
        values="0.008 0.012;0.015 0.02;0.008 0.012" repeatCount="indefinite"/>
    </feTurbulence>
    <feDisplacementMap id="warpDisp" in="SourceGraphic" in2="n" scale="0"
      xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>
<div id="eyelids"><div class="lid" id="lidTop"></div><div class="lid" id="lidBot"></div></div>

<div id="stickL" class="stick"><div class="knob" id="knobL"></div></div>
<button id="shootBtn" class="abtn" aria-label="draw">
  <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 3.5 Q2.5 14 8 24.5"/>
    <path d="M8 3.5 L19 14 L8 24.5"/>
    <path d="M7 14 H25"/>
    <path d="M21.5 10.7 L25.6 14 L21.5 17.3"/></svg>
</button>
<button id="jumpBtn" class="abtn" aria-label="jump">
  <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4.5 21 Q14 2.5 23.5 21"/>
    <circle cx="4.5" cy="21" r="1.7" fill="currentColor" stroke="none"/>
    <path d="M6 24.5 H22"/></svg>
</button>
<button id="oarL" class="abtn" aria-label="left oar — circle to row">
  <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 14 a8 8 0 1 1 -3.2 -6.4"/><path d="M22 5 l0 4 l-4 0"/></svg>
  <span>row</span>
</button>
<button id="oarR" class="abtn" aria-label="right oar — circle to row">
  <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 14 a8 8 0 1 0 3.2 -6.4"/><path d="M6 5 l0 4 l4 0"/></svg>
  <span>row</span>
</button>

<div id="vignette"></div>
<div id="exhaust"></div>
<button id="consume">Consume</button>
<div id="title">
  <h1>CONSUME</h1>
  <div class="rule"><i></i>
    <svg viewBox="0 0 30 12" aria-hidden="true"><line x1="2" y1="6" x2="22" y2="6" stroke="#caa06a" stroke-width="1.4"/><path d="M21 2 L28 6 L21 10" fill="none" stroke="#caa06a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <i></i></div>
  <button id="play" aria-label="begin" style="opacity:0;height:1px;padding:0;margin:0"></button>
  <div id="loadmsg"></div>
</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script>
  // any startup crash prints HERE instead of an eternal loading screen
  const showErr = (m) => { const el = document.getElementById('loadmsg');
    if (el) { el.textContent = '⚠ ' + m; el.style.opacity = 1; el.style.color = '#ff9d8a'; } };
  window.addEventListener('error', e => showErr(e.message || 'script error'));
  window.addEventListener('unhandledrejection', e => showErr(e.reason?.message || e.reason || 'load failed'));
</script>
<script type="module">
  // cache-proof: the game code is always fetched fresh (it's ~40KB);
  // the heavy CDN/three + GLB assets stay cached as normal
  import('./game.js?ts=' + Date.now()).catch(e => {
    const el = document.getElementById('loadmsg');
    if (el) { el.textContent = '⚠ ' + (e.message || e); el.style.color = '#ff9d8a'; }
  });
</script>
</body>
</html>
